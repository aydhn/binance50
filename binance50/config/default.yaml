      enabled: true
      k_period: 14
      d_period: 3
      smooth_k: 3
    stoch_rsi:
      enabled: true
      rsi_period: 14
      stoch_period: 14
      k_period: 3
      d_period: 3
    roc_periods:
    - 5
    - 10
    - 20
    mom_periods:
    - 5
    - 10
    - 20
    cci_periods:
    - 14
    - 20
    willr_periods:
    - 14
  volatility:
    enabled: true
    atr_periods:
    - 14
    - 21
    natr_periods:
    - 14
    bollinger:
      enabled: true
      period: 20
      stddev: 2.0
    keltner:
      enabled: true
      period: 20
      atr_period: 14
      multiplier: 2.0
    donchian:
      enabled: true
      period: 20
    rolling_std_periods:
    - 10
    - 20
    - 50
  volume:
    enabled: true
    obv: true
    vwap:
      enabled: true
      session_mode: rolling
      rolling_period: 20
    mfi_periods:
    - 14
    cmf_periods:
    - 20
    adl: true
    volume_sma_periods:
    - 20
    - 50
    volume_ema_periods:
    - 20
  transforms:
    enabled: true
    returns_periods:
    - 1
    - 3
    - 5
